<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>法务审核系统 - 合同审核</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei",sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;color:#333}
/* Topbar */
.topbar{background:#1a237e;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;flex-shrink:0}
.topbar h1{font-size:18px;font-weight:600;white-space:nowrap}
.topbar nav{display:flex;gap:4px}
.topbar nav a{color:rgba(255,255,255,.7);text-decoration:none;padding:8px 16px;border-radius:6px;font-size:14px;transition:all .15s;white-space:nowrap}
.topbar nav a:hover{background:rgba(255,255,255,.12);color:#fff}
.topbar nav a.active{background:rgba(255,255,255,.2);color:#fff;font-weight:600}
.topbar .info{display:flex;align-items:center;gap:14px;font-size:13px;white-space:nowrap}
.topbar .info .model-tag{background:rgba(255,255,255,.15);padding:4px 10px;border-radius:12px;font-size:12px}
.topbar .info .btn-login{background:#4caf50;border:none;color:#fff;padding:5px 16px;border-radius:4px;cursor:pointer;font-size:13px}
.topbar .info .btn-logout{background:#1a237e;border:1px solid rgba(255,255,255,.4);color:#fff;padding:4px 14px;border-radius:4px;cursor:pointer;font-size:13px}
/* Content */
.content{flex:1;overflow-y:auto;padding:28px 40px}
/* Modal overlay - MUST BE display:none by default */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}
.modal-overlay.show{display:flex}
/* Modal box */
.modal{background:#fff;border-radius:12px;padding:32px;width:380px;max-width:92vw;box-shadow:0 8px 32px rgba(0,0,0,.25);position:relative}
.modal h2{text-align:center;color:#1a237e;margin-bottom:24px;font-size:20px}
.modal input,.modal select{width:100%;padding:10px 12px;border:1px solid #d0d0d0;border-radius:6px;margin-bottom:14px;font-size:14px;outline:none;font-family:inherit;background:#fff}
.modal input:focus,.modal select:focus{border-color:#1a237e;box-shadow:0 0 0 2px rgba(26,35,126,.1)}
.modal .btn-row{display:flex;gap:10px;margin-top:8px}
.modal button{flex:1;padding:10px;border:none;border-radius:6px;font-size:14px;cursor:pointer;transition:all .15s}
.modal .btn-primary{background:#1a237e;color:#fff}
.modal .btn-primary:hover{background:#283593}
.modal .error{color:#c62828;font-size:13px;margin-bottom:8px;display:none;background:#ffebee;padding:8px 12px;border-radius:6px}
.modal .tabs{display:flex;margin-bottom:20px;background:#f0f2f5;border-radius:8px;padding:3px}
.modal .tabs button{flex:1;padding:8px;background:transparent;border:none;border-radius:6px;font-size:14px;cursor:pointer;color:#666;transition:all .15s}
.modal .tabs button.active{background:#fff;color:#1a237e;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.1)}
/* Tables */
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{background:#f5f6fa;color:#1a237e;font-weight:600;padding:10px 14px;text-align:left;border-bottom:2px solid #e0e0e0;font-size:13px}
tbody td{padding:10px 14px;border-bottom:1px solid #f0f0f0;color:#555}
tbody tr:hover{background:#f8f9ff}
/* Panels */
.panel,.section{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.panel h3,.section h3{font-size:16px;color:#1a237e;margin-bottom:12px;font-weight:600}
.page-title{font-size:22px;font-weight:700;color:#1a237e;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #e8e8e8}
/* Upload zone */
.upload-zone{border:2px dashed #c0c4cc;border-radius:8px;padding:30px 20px;text-align:center;cursor:pointer;transition:all .15s;background:#fafafa;margin-bottom:16px}
.upload-zone:hover{border-color:#1a237e;background:#f5f6fa}
.upload-zone .icon{font-size:40px;margin-bottom:8px}
/* Stat cards */
.grid{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:16px}
.stat-card{flex:1;min-width:160px;background:#fff;border-radius:8px;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-card h4{font-size:13px;color:#888;margin-bottom:6px}
.stat-card .num{font-size:28px;font-weight:700;color:#1a237e}
/* Status tags */
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:500}
.tag-pending{background:#fff3e0;color:#e65100}
.tag-processing{background:#e3f2fd;color:#1565c0}
.tag-done{background:#e8f5e9;color:#2e7d32}
/* Chat */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-flow{flex:1;overflow-y:auto;padding:24px 32px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:10px;max-width:75%}.msg.ai{align-self:flex-start}.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.msg.ai .avatar{background:#e8eaf6;color:#1a237e}.msg.user .avatar{background:#e3f2fd;color:#0d47a1}
.msg .bubble{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg.ai .bubble{background:#fff;border:1px solid #e0e0e0;border-top-left-radius:4px}
.msg.user .bubble{background:#1a237e;color:#fff;border-top-right-radius:4px}
.input-bar{border-top:1px solid #e0e0e0;background:#fff;padding:12px 24px;display:flex;gap:12px;align-items:flex-end}
.input-bar textarea{flex:1;resize:none;border:1px solid #d0d0d0;border-radius:8px;padding:10px 14px;font-size:14px;font-family:inherit;line-height:1.5;max-height:120px;outline:none}
.input-bar textarea:focus{border-color:#1a237e}
.input-bar button{background:#1a237e;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;cursor:pointer}
.welcome{text-align:center;color:#888;padding:40px 20px}.welcome h2{color:#1a237e;font-size:20px;margin-bottom:10px}
/* Scrollbar */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
</style></head><body>
<div class="topbar"><h1>⚖️ 法务审核系统</h1><nav><a href="/">法务咨询</a><a href="/audit" class="active">合同审核</a><a href="/work-order">工单管理</a><a href="/history">历史记录</a><a href="/contract-template">合同模板</a><a href="/admin">管理后台</a></nav><div class="info"><span class="model-tag" id="modelTag">--</span><span id="userDisplay" onclick="openModal()" style="cursor:pointer">游客</span><button class="btn-login" id="btnLogin" onclick="openModal()" style="display:none">登录</button><button class="btn-logout" id="btnLogout" onclick="doLogout()" style="display:none">退出</button></div></div>
<div class="content">
  <h2>📋 合同审核</h2>
  <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📄</div><p>点击或拖拽合同文件到此处上传</p>
    <p>支持 PDF、DOCX、TXT 格式</p>
    <input type="file" id="fileInput" accept=".pdf,.docx,.txt" onchange="uploadFile(this)">
  </div>
  <div class="contract-list"><table><thead><tr><th>ID</th><th>文件名</th><th>状态</th><th>上传时间</th><th>操作</th></tr></thead>
  <tbody id="contractBody"><tr><td colspan="5" style="text-align:center;color:#999;padding:24px">加载中...</td></tr></tbody></table></div>
  <div class="risk-panel" id="riskPanel"><h3 id="riskTitle">🔍 审核结果</h3><div id="riskContent"></div></div>
</div>
<div class="modal-overlay" id="loginModal" style="display:none">
  <div class="modal">
    <h2>⚖️ 法务审核系统</h2>
    <div class="tabs"><button class="active" onclick="switchTab('login')">登录</button><button onclick="switchTab('register')">注册</button></div>
    <div id="errorBox" class="error"></div>
    <div id="loginForm">
      <input type="text" id="authUser" placeholder="用户名">
      <input type="password" id="authPass" placeholder="密码">
      <div class="btn-row"><button class="btn-primary" onclick="doAuth()">登 录</button></div>
    </div>
    <div id="registerForm" style="display:none">
      <select id="regCompany"><option value="">选择公司</option></select>
      <select id="regDept"><option value="">选择部门</option></select>
      <select id="regName"><option value="">选择人员姓名</option></select>
      <input type="text" id="regUser" placeholder="用户名(字母+数字,4-20位)">
      <input type="password" id="regPass" placeholder="密码(&ge;6位,字母+数字)">
      <div class="btn-row"><button class="btn-primary" onclick="doRegister()">注 册</button></div>
    </div>
  </div>
</div>
<script>
let authMode='login',currentUser=null;
function switchTab(m){
  authMode=m;
  var btns = document.querySelectorAll('.modal .tabs button');
  btns.forEach(function(b){b.classList.remove('active');});
  var idx = m === 'login' ? 0 : 1;
  if (btns[idx]) btns[idx].classList.add('active');
  document.getElementById('loginForm').style.display = m === 'login' ? '' : 'none';
  document.getElementById('registerForm').style.display = m === 'register' ? '' : 'none';
  document.getElementById('errorBox').style.display = 'none';
}
function doAuth(){
  var u = document.getElementById('authUser').value.trim();
  var p = document.getElementById('authPass').value.trim();
  if (!u || !p) { showError('请输入用户名和密码'); return; }
  var fd = new FormData();
  fd.append('username', u);
  fd.append('password', p);
  if (authMode === 'login') fd.append('device_fingerprint', navigator.userAgent + '|' + screen.width + 'x' + screen.height);
  fetch('/api/' + authMode, { method: 'POST', body: fd })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.code !== 0) { showError(d.msg || d.detail || '操作失败'); return; }
      if (authMode === 'register') { switchTab('login'); showError('注册成功，请登录'); return; }
      currentUser = d.data;
      document.getElementById('loginModal').style.display = 'none';
      document.getElementById('userDisplay').textContent = currentUser.username + ' (' + currentUser.role + ')';
      var bL = document.getElementById('btnLogin');
      var bO = document.getElementById('btnLogout');
      if (bL) bL.style.display = 'none';
      if (bO) bO.style.display = 'inline-block';
      loadModelStatus();
      if (typeof onAuth === 'function') onAuth();
    })
    .catch(function(){ showError('网络错误'); });
}
function showError(m){ var el = document.getElementById('errorBox'); el.textContent = m; el.style.display = 'block'; }
function loadOrgOptions(){}
function openModal(){ console.log('[Auth] openModal() called'); var m = document.getElementById('loginModal'); if (m) { m.style.display = 'flex'; console.log('[Auth] Modal display set to flex'); } else { console.error('[Auth] loginModal not found!'); } loadOrgOptions(); }
async function doLogout(){
  try { await fetch('/api/logout', { method: 'POST' }); } catch(e) {}
  document.cookie = 'law_token=;max-age=0;path=/;domain=' + location.hostname;
  document.cookie = 'law_token=;max-age=0;path=/';
  localStorage.removeItem('guest_token');
  location.reload();
}
function loadModelStatus(){
  fetch('/api/admin/model-status').then(function(r){return r.json();}).then(function(d){
    if (d.code === 0 && d.data.model) {
      var m = typeof d.data.model === 'object' ? d.data.model.default : d.data.model;
      document.getElementById('modelTag').textContent = '\u6a21\u578b: ' + m;
    }
  }).catch(function(){});
}
function esc(t){ return t ? t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }
function getGuestToken() { var gt = localStorage.getItem('guest_token'); if (!gt) { gt = 'guest_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); localStorage.setItem('guest_token', gt); } return gt; }
function checkAuth(){
  return fetch('/api/me').then(function(r){ if (r.ok) return r.json(); throw new Error(); })
    .then(function(d){
      if (d.code === 0) {
        currentUser = d.data;
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('userDisplay').textContent = currentUser.username + ' (' + currentUser.role + ')';
        var bL = document.getElementById('btnLogin');
        var bO = document.getElementById('btnLogout');
        if (bL) bL.style.display = 'none';
        if (bO) bO.style.display = 'inline-block';
        loadModelStatus();
        if (typeof onAuth === 'function') onAuth();
        return true;
      }
      throw new Error();
    }).catch(function(){
      var bL = document.getElementById('btnLogin');
      var bO = document.getElementById('btnLogout');
      if (bL) bL.style.display = 'inline-block';
      if (bO) bO.style.display = 'none';
      document.getElementById('userDisplay').textContent = '\u6e38\u5ba2';
      return false;
    });
}
checkAuth();
function onAuth(){ loadContracts(); }
function loadContracts(){
  fetch('/api/history').then(function(r){return r.json();}).then(function(d){
    if (d.code !== 0) return;
    var body = document.getElementById('contractBody');
    var list = d.data.contracts || [];
    if (!list.length) { body.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999;padding:24px">暂无合同</td></tr>'; return; }
    body.innerHTML = list.map(function(c){
      var st = {uploaded:'待审核', auditing:'审核中', audited:'已审核'}[c.status] || c.status;
      var acts = '';
      if (c.status === 'uploaded') acts += '<button class="btn-sm btn-audit" onclick="auditContract(' + c.id + ')">审核</button>';
      if (c.status === 'audited') {
        acts += '<button class="btn-sm btn-audit" onclick="viewRisk(' + c.id + ')">查看风险</button>';
        acts += '<button class="btn-sm btn-download" onclick="dlDocx(' + c.id + ')">下载DOCX</button>';
      }
      return '<tr><td>' + c.id + '</td><td>' + esc(c.filename) + '</td><td><span class="st s-' + c.status + '">' + st + '</span></td><td>' + c.created_at + '</td><td>' + acts + '</td></tr>';
    }).join('');
  }).catch(function(){});
}
function uploadFile(input){
  var file = input.files[0]; if (!file) return;
  var fd = new FormData(); fd.append('file', file);
  fetch('/api/contract/upload', { method: 'POST', body: fd })
    .then(function(r){return r.json();})
    .then(function(d){
      if (d.code === 0) { loadContracts(); if (d.data && d.data.id) auditContract(d.data.id); }
      else alert(d.msg || '上传失败');
    }).catch(function(){ alert('上传失败'); });
  input.value = '';
}
function auditContract(id){
  var panel = document.getElementById('riskPanel');
  var content = document.getElementById('riskContent');
  document.getElementById('riskTitle').textContent = '🔍 正在审核合同 #' + id + '...';
  content.innerHTML = '<div class="audit-loading"><span class="spinner"></span>AI正在分析合同风险，请稍候...</div>';
  panel.style.display = 'block';
  panel.scrollIntoView({behavior:'smooth'});
  fetch('/api/contract/' + id + '/audit', { method: 'POST' })
    .then(function(r){return r.json();})
    .then(function(d){
      loadContracts();
      if (d.code === 0 && d.data && d.data.risks) renderRisks(d.data.risks, d.data.filename || '合同 #' + id);
      else if (d.code === 0) content.innerHTML = '<p style="color:#2e7d32">✅ 审核完成，未发现显著风险</p>';
      else content.innerHTML = '<p style="color:#c62828">❌ ' + (d.msg || d.detail || '审核失败') + '</p>';
    }).catch(function(){ content.innerHTML = '<p style="color:#c62828">❌ 网络错误</p>'; });
}
function viewRisk(id){
  fetch('/api/contract/' + id + '/audit', { method: 'POST' })
    .then(function(r){return r.json();})
    .then(function(d){
      var panel = document.getElementById('riskPanel');
      panel.style.display = 'block';
      if (d.code === 0 && d.data && d.data.risks) renderRisks(d.data.risks, d.data.filename || '合同 #' + id);
      else document.getElementById('riskContent').innerHTML = '<p>暂无风险数据</p>';
      panel.scrollIntoView({behavior:'smooth'});
    }).catch(function(){});
}
function renderRisks(risks, filename){
  var content = document.getElementById('riskContent');
  document.getElementById('riskTitle').textContent = '🔍 审核结果 — ' + filename;
  if (!risks || !risks.length) { content.innerHTML = '<p style="color:#2e7d32">✅ 未发现风险</p>'; return; }
  var hc = risks.filter(function(r){return r.level === 'high';}).length;
  var mc = risks.filter(function(r){return r.level === 'medium';}).length;
  var lc = risks.filter(function(r){return r.level === 'low';}).length;
  var h = '<div class="risk-summary">共发现 <strong>' + risks.length + '</strong> 个风险点：';
  if (hc) h += ' <span style="color:#c62828">高风险 ' + hc + '</span>';
  if (mc) h += ' <span style="color:#ef6c00">中风险 ' + mc + '</span>';
  if (lc) h += ' <span style="color:#2e7d32">低风险 ' + lc + '</span>';
  h += '</div>';
  risks.forEach(function(r){
    var lv = r.level || 'low';
    var lt = {high:'高风险', medium:'中风险', low:'低风险'}[lv] || lv;
    h += '<div class="ri ' + lv + '"><div class="rh"><span class="lv ' + lv + '">' + lt + '</span><span class="rp">' + esc(r.position || '') + '</span></div>';
    if (r.clause) h += '<div class="rc">📄 ' + esc(r.clause) + '</div>';
    h += '<div class="rd">';
    if (r.description) h += '<strong>风险描述：</strong>' + esc(r.description) + '<br>';
    if (r.law_basis) h += '<strong>法律依据：</strong>' + esc(r.law_basis) + '<br>';
    if (r.suggestion) h += '<strong>修改建议：</strong>' + esc(r.suggestion);
    h += '</div></div>';
  });
  content.innerHTML = h;
}
function dlDocx(id){ window.location.href = '/api/contract/' + id + '/download-docx'; }
</script></body></html>
